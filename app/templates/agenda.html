{% extends "base.html" %}
{% block titulo %}Agenda Médica{% endblock %}
{% block head %}
<link href="https://unpkg.com/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
{% endblock %}

{% block descricao %}
<div class="card">
  <h2 style="margin-top:0;">Agendamentos</h2>

  <form id="form-busca" style="display:flex; gap:.5rem; margin-bottom:1rem;">
    <input id="campo-busca" type="text" placeholder="Buscar por nome do médico ou especialidade"
           style="flex:1; padding:.6rem; border:1px solid #d1d5db; border-radius:6px;">
    <button type="submit" style="padding:.6rem 1.2rem; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer;">
      Buscar
    </button>
    <button type="button" id="btn-limpar" style="padding:.6rem 1.2rem; background:#e5e7eb; border:none; border-radius:6px; cursor:pointer;">
      Limpar
    </button>
  </form>

  <div id="alerta" class="alerta" style="display:none;"></div>

  <div id="tabela-agenda"></div>
</div>
{% endblock %}

{% block script %}
<script>
let table;

function mostrarAlerta(msg, tipo) {
  const div = document.getElementById('alerta');
  if (!msg) { div.style.display = 'none'; return; }
  div.textContent = msg;
  div.className = 'alerta ' + (tipo || 'erro');
  div.style.display = 'block';
}

function carregarAgendamentos(termo) {
  mostrarAlerta('');
  const url = '/api/agendamentos' + (termo ? ('?q=' + encodeURIComponent(termo)) : '');

  fetch(url)
    .then(async (resp) => {
      let data = null;
      try { data = await resp.json(); } catch (e) { data = null; }

      if (resp.status === 401) {
        window.location.href = '/login';
        return;
      }
      if (!resp.ok) {
        mostrarAlerta((data && data.erro) || 'Não foi possível carregar os agendamentos no momento.', 'erro');
        table.setData([]);
        return;
      }

      const lista = (data && data.agendamentos) || [];
      table.setData(lista);

      if (lista.length === 0) {
        mostrarAlerta((data && data.mensagem) || 'Nenhum agendamento encontrado.', 'info');
      }
    })
    .catch((err) => {
      console.error(err);
      mostrarAlerta('Erro de comunicação com o servidor. Verifique sua conexão.', 'erro');
      table.setData([]);
    });
}

document.addEventListener('DOMContentLoaded', () => {
  table = new Tabulator('#tabela-agenda', {
    layout: 'fitColumns',
    placeholder: 'Nenhum agendamento disponível.',
    columns: [
      { title: 'Data', field: 'data', headerFilter: true },
      { title: 'Horário', field: 'horario' },
      { title: 'Médico', field: 'medico', headerFilter: true },
      { title: 'Especialidade', field: 'especialidade' },
      { title: 'Convênio', field: 'convenio' }
    ],
  });

  carregarAgendamentos('');

  document.getElementById('form-busca').addEventListener('submit', (e) => {
    e.preventDefault();
    const termo = document.getElementById('campo-busca').value.trim();
    carregarAgendamentos(termo);
  });

  document.getElementById('btn-limpar').addEventListener('click', () => {
    document.getElementById('campo-busca').value = '';
    carregarAgendamentos('');
  });
});
</script>
{% endblock %}
