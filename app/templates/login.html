{% extends "base.html" %}
{% block titulo %}Login - Agenda Médica{% endblock %}
{% block description %}
<div class="card" style="max-width:380px; margin:3rem auto;">
  <h2 style="margin-top:0;">Entrar</h2>
  <form method="POST" action="{{ url_for('auth.login') }}">
    <label>E-mail</label><br>
    <input type="email" name="email" style="width:100%; padding:.6rem; margin:.3rem 0 1rem; border:1px solid #d1d5db; border-radius:6px;" required><br>

    <label>Senha</label><br>
    <input type="password" name="senha" style="width:100%; padding:.6rem; margin:.3rem 0 1.2rem; border:1px solid #d1d5db; border-radius:6px;" required><br>

    <button type="submit" style="width:100%; padding:.7rem; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:1rem;">
      Entrar
    </button>
  </form>
</div>
{% endblock %}
