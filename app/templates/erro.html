<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>{{ titulo }} - Agenda Médica</title>
  <style>
    body { 
        font-family: Arial, 
        sans-serif; 
        background:#f4f6f8; 
        display:flex; height:100vh;
        align-items:center; 
        justify-content:center; margin:0; 
    }
    .box { 
        background:#fff; 
        padding:2rem 3rem; 
        border-radius:8px; 
        box-shadow:0 2px 10px rgba(0,0,0,.1); 
        text-align:center; 
    }
    a { 
        color:#2563eb; 
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>{{ titulo }}</h2>
    <p>{{ mensagem }}</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
